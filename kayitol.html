<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // BURAYI KENDİ ANAHTARINLA DEĞİŞTİRMEYİ UNUTMA
        emailjs.init("BURAYA_PUBLIC_KEY"); 

        const firebaseConfig = {
            apiKey: "AIzaSyCkyxgXj4m7lX07UWcuq41f0VYGgaADDYU",
            authDomain: "delicraft-3fc8e.firebaseapp.com",
            projectId: "delicraft-3fc8e",
            storageBucket: "delicraft-3fc8e.firebasestorage.app",
            messagingSenderId: "93159206834",
            appId: "1:93159206834:web:ad3dec0d73ae0f6b32feab"
        };

        const auth = getAuth(initializeApp(firebaseConfig));

        document.getElementById('kayitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const kod = Math.floor(100000 + Math.random() * 900000);

            try {
                // Mail gönderimi
                await emailjs.send("DeliCraft", "template_hha4g7k", {
                    to_email: email,
                    verification_code: kod 
                });

                const girilenKod = prompt("E-postana gelen 6 haneli kodu gir:");

                if (girilenKod == kod.toString()) {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Kayıt başarılı, hoş geldin " + username + "!");
                    window.location.href = "index.html";
                } else {
                    alert("Kod yanlış!");
                }
            } catch (error) {
                // HATA YAKALAMA KISMINI DÜZELTTİM
                console.error("Detaylı Hata:", error);
                
                // Eğer hata bir obje ise onu düz metne çevirip göster, değilse direkt hatayı göster
                let hataMesaji = error.text || error.message || JSON.stringify(error) || "Bilinmeyen bir hata oluştu";
                alert("Hata: " + hataMesaji);
            }
        });
    </script>
