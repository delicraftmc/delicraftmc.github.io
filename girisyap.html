<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DeliCraft | Giriş Yap</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; background: #09090b; color: white; }</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <header class="w-full max-w-3xl flex justify-between items-center py-6 px-4">
        <a href="index.html" class="flex items-center gap-3"><img src="logo.png" class="w-10 h-10 rounded-lg"><span class="text-2xl font-extrabold">DELICRAFT</span></a>
        <a href="kayitol.html" class="text-sm font-semibold hover:text-indigo-400">Kayıt Ol</a>
    </header>
    <main class="w-full max-w-md mt-20 bg-white/5 p-8 rounded-3xl border border-white/10">
        <h2 class="text-3xl font-bold mb-6">Giriş Yap</h2>
        <form class="space-y-4">
            <input type="text" placeholder="Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
            <input type="password" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
            <button class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Giriş Yap</button>
        </form>
    </main>
</body>
</html>
