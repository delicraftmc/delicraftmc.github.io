<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliCraft | Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>body { font-family: sans-serif; background: #09090b; color: white; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white/5 p-8 rounded-3xl border border-white/10 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">DeliCraft Kayıt</h2>
        <form id="kayitForm" class="space-y-4">
            <input type="text" id="username" placeholder="Minecraft Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 transition" required>
            <input type="email" id="email" placeholder="E-posta" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 transition" required>
            <input type="password" id="password" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 transition" required>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-bold transition duration-200">Hesap Oluştur</button>
        </form>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // 🚀 updateProfile fonksiyonunu buraya ekledim kanka (Minecraft adını kaydetmek için)
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // BURAYA PUBLIC KEY GELECEK
        emailjs.init("BURAYA_PUBLIC_KEY"); 

        const firebaseConfig = {
            apiKey: "AIzaSyCkyxgXj4m7lX07UWcuq41f0VYGgaADDYU",
            authDomain: "delicraft-3fc8e.firebaseapp.com",
            projectId: "delicraft-3fc8e",
            storageBucket: "delicraft-3fc8e.firebasestorage.app",
            messagingSenderId: "93159206834",
            appId: "1:93159206834:web:ad3dec0d73ae0f6b32feab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('kayitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const kod = Math.floor(100000 + Math.random() * 900000);

            try {
                // BURAYA SERVICE ID GELECEK (service_ ile başlayan)
                await emailjs.send("BURAYA_SERVICE_ID_YAZILACAK", "template_hha4g7k", {
                    to_email: email,
                    verification_code: kod 
                });

                const girilenKod = prompt("E-postana gelen 6 haneli kodu gir:");

                if (girilenKod == kod.toString()) {
                    // 1. Firebase üzerinde kullanıcıyı oluşturuyoruz
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // 2. 🚀 Minecraft kullanıcı adını Firebase profiline (displayName olarak) kaydediyoruz
                    await updateProfile(userCredential.user, {
                        displayName: username
                    });

                    alert("Kayıt başarılı, hoş geldin " + username + "!");
                    
                    // 3. 🚀 Kullanıcıyı doğrudan skin ve karakter yönetim sayfasına yönlendiriyoruz
                    window.location.href = "yonetim.html";
                } else {
                    alert("Kod yanlış! İşlem iptal edildi.");
                }
            } catch (error) {
                console.error("Detaylı Hata:", error);
                let hataMesaji = error.text || error.message || JSON.stringify(error) || "Bilinmeyen bir hata oluştu";
                alert("Hata: " + hataMesaji);
            }
        });
    </script>
</body>
</html>
