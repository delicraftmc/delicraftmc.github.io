<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DeliCraft Kayıt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">
    <form id="form" class="bg-white/5 p-8 rounded-2xl w-full max-w-sm border border-white/10 space-y-4">
        <input type="text" id="username" placeholder="Kullanıcı Adı" class="w-full bg-black p-3 rounded-lg border border-white/10" required>
        <input type="email" id="email" placeholder="E-posta" class="w-full bg-black p-3 rounded-lg border border-white/10" required>
        <input type="password" id="password" placeholder="Şifre" class="w-full bg-black p-3 rounded-lg border border-white/10" required>
        <button type="submit" class="w-full bg-indigo-600 p-3 rounded-lg font-bold">Kayıt Ol</button>
    </form>

    <script>
        emailjs.init("xUg90z5zOAawA5leu"); 

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const kod = Math.floor(100000 + Math.random() * 900000);

            try {
                await emailjs.send("DeliCraft", "template_hha4g7k", { to_email: email, verification_code: kod });
                const girilenKod = prompt("E-postana gelen kodu gir:");
                
                if (girilenKod == kod) {
                    const res = await fetch("http://localhost:3000/api/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, email, password })
                    });
                    const data = await res.json();
                    if (data.success) alert("Kayıt Başarılı!");
                    else alert("Hata: " + data.message);
                }
            } catch (err) { alert("Hata: " + err.message); }
        });
    </script>
</body>
</html>
