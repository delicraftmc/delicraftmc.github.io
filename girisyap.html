<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliCraft | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #09090b; color: white; }
        .glow-blob { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%); filter: blur(60px); z-index: -1; top: -100px; left: -100px; }
        .glow-blob-2 { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%); filter: blur(60px); z-index: -1; bottom: -100px; right: -100px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="glow-blob"></div>
    <div class="glow-blob-2"></div>

    <div id="loadingScreen" class="flex flex-col items-center gap-4">
        <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-zinc-400 text-sm">Discord ile giriş yapılıyor...</p>
    </div>

    <main id="loginFormContainer" class="hidden w-full max-w-md bg-white/5 p-8 rounded-3xl border border-white/10 shadow-2xl relative z-10 backdrop-blur-sm">
        <div class="flex flex-col items-center mb-6">
            <img src="logo.png" alt="Logo" class="w-12 h-12 rounded-xl mb-3 shadow-lg">
            <h2 class="text-3xl font-extrabold tracking-tight text-center">Giriş Yap</h2>
            <p class="text-zinc-400 text-xs mt-1">DeliCraft dünyasına geri dön!</p>
        </div>

        <div id="msgBox" class="hidden p-4 rounded-xl text-sm font-semibold mb-4 border transition-all duration-300"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="E-posta Adresi" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" required>
            </div>
            <div>
                <input type="password" id="password" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold shadow-[0_0_15px_rgba(79,70,229,0.3)] transition duration-200">Giriş Yap</button>
        </form>

        <div class="mt-6 text-center text-sm text-zinc-400">
            Hesabın yok mu? <a href="kayitol.html" class="text-indigo-400 hover:underline font-semibold">Kayıt Ol</a>
        </div>
    </main>

    <script>
        // Discord OAuth callback (PKCE)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (error) {
            sessionStorage.removeItem('dc_code_verifier');
            window.location.href = 'index.html?error=discord_reddedildi';
        } else if (code) {
            (async () => {
                try {
                    const codeVerifier = sessionStorage.getItem('dc_code_verifier');
                    sessionStorage.removeItem('dc_code_verifier');

                    if (!codeVerifier) {
                        window.location.href = 'index.html?error=dogrulama_kodu_bulunamadi';
                        return;
                    }

                    const tokenRes = await fetch('https://discord.com/api/oauth2/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: '1524146338403713085',
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: 'https://delicraftmc.github.io/girisyap.html',
                            code_verifier: codeVerifier
                        })
                    });

                    if (!tokenRes.ok) {
                        window.location.href = 'index.html?error=token_alınamadı';
                        return;
                    }

                    const tokenData = await tokenRes.json();
                    const accessToken = tokenData.access_token;

                    const userRes = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });

                    if (!userRes.ok) {
                        window.location.href = 'index.html?error=kullanici_bilgisi_alınamadı';
                        return;
                    }

                    const user = await userRes.json();
                    const avatar_url = user.avatar
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                        : `https://cdn.discordapp.com/embed/avatars/${user.discriminator % 5}.png`;

                    const userData = {
                        id: user.id,
                        username: user.global_name || user.username,
                        avatar_url: avatar_url,
                        email: user.email || ''
                    };

                    localStorage.setItem('delicraft_user', JSON.stringify(userData));
                    window.location.href = 'index.html?giris=basarili';
                } catch (err) {
                    window.location.href = 'index.html?error=beklenmeyen_hata';
                }
            })();
        } else {
            // Direct visit: show Firebase login form
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('loginFormContainer').classList.remove('hidden');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkyxgXj4m7lX07UWcuq41f0VYGgaADDYU",
            authDomain: "delicraft-3fc8e.firebaseapp.com",
            projectId: "delicraft-3fc8e",
            storageBucket: "delicraft-3fc8e.firebasestorage.app",
            messagingSenderId: "93159206834",
            appId: "1:93159206834:web:ad3dec0d73ae0f6b32feab",
            measurementId: "G-W32K1X605V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const msgBox = document.getElementById('msgBox');
        const submitBtn = document.getElementById('submitBtn');

        function showMessage(text, type) {
            msgBox.textContent = text;
            msgBox.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400', 'bg-red-500/10', 'border-red-500/30', 'text-red-400');

            if (type === 'success') {
                msgBox.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400');
            } else {
                msgBox.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = "Giriş Yapılıyor...";

            try {
                const credential = await signInWithEmailAndPassword(auth, email, password);

                if (!credential.user.emailVerified) {
                    await signOut(auth);
                    showMessage("Önce e-posta adresine gelen doğrulama linkine basmalısın.", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Giriş Yap";
                    return;
                }

                const userDoc = await getDoc(doc(db, "users", credential.user.uid));
                const username = userDoc.exists() ? userDoc.data().username : "Oyuncu";

                showMessage(`Giriş başarılı, ${username}! Panele yönlendiriliyorsunuz...`, "success");

                setTimeout(() => {
                    window.location.href = "yonetim.html";
                }, 1500);

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Giriş Yap";

                let turkceHata = "Giriş yapılamadı. Lütfen bilgilerinizi kontrol edin.";

                if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                    turkceHata = "E-posta adresi veya şifre hatalı!";
                } else if (error.code === "auth/invalid-email") {
                    turkceHata = "Geçersiz bir e-posta adresi girdiniz.";
                } else if (error.code === "auth/too-many-requests") {
                    turkceHata = "Çok fazla hatalı deneme yaptınız. Lütfen daha sonra tekrar deneyin.";
                }

                showMessage(turkceHata, "error");
            }
        });
    </script>
</body>
</html>
