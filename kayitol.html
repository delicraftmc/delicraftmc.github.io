<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliCraft | Kayıt Ol</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; background: #09090b; color: white; }</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <header class="w-full max-w-3xl flex justify-between items-center py-6 px-4">
        <a href="index.html" class="flex items-center gap-3"><img src="logo.png" class="w-10 h-10 rounded-lg"><span class="text-2xl font-extrabold tracking-tighter">DELICRAFT</span></a>
        <a href="giris.html" class="text-sm font-semibold hover:text-indigo-400">Giriş Yap</a>
    </header>

    <main class="w-full max-w-md mt-20 bg-white/5 p-8 rounded-3xl border border-white/10">
        <h2 class="text-3xl font-bold mb-6">Kayıt Ol</h2>
        <form class="space-y-4">
            <input type="text" placeholder="Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500">
            <input type="email" placeholder="E-posta" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500">
            <input type="password" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500">
            <button class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition-all">Hesap Oluştur</button>
        </form>
    </main>
</body>
</html>
