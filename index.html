<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DeliCraft | Galaktik Altın</title>
    <style>
        .menu-blur { backdrop-filter: blur(12px); background: rgba(0, 0, 0, 0.7); }
        .gold-border { border: 1px solid #D4AF37; }
        .gold-text { color: #D4AF37; }
    </style>
</head>
<body class="bg-[#09090b] text-white font-sans selection:bg-[#D4AF37]">

    <button onclick="document.getElementById('side-menu').classList.toggle('-translate-x-full')" class="fixed top-6 left-6 z-50 p-3 bg-black/50 border gold-border rounded-lg">
        <div class="space-y-1.5">
            <div class="w-6 h-0.5 bg-[#D4AF37]"></div>
            <div class="w-6 h-0.5 bg-[#D4AF37]"></div>
            <div class="w-6 h-0.5 bg-[#D4AF37]"></div>
        </div>
    </button>

    <div id="side-menu" class="fixed top-0 left-0 h-full w-64 z-40 menu-blur border-r gold-border transform -translate-x-full transition-transform duration-300 p-8 pt-24 space-y-6">
        <div class="gold-text font-bold uppercase tracking-widest border-b border-[#D4AF37]/30 pb-2">Menü</div>
        <div class="flex flex-col gap-4 text-sm">
            <a href="#hakkimizda" class="hover:text-[#D4AF37]">Hakkımızda</a>
            <a href="#kurucular" class="hover:text-[#D4AF37]">Kurucular</a>
            <a href="#sosyal" class="hover:text-[#D4AF37]">Sosyal Medya</a>
        </div>
    </div>

    <main class="max-w-3xl mx-auto pt-32 px-6 space-y-8 text-center">
        <h1 class="text-6xl font-extrabold text-[#D4AF37]">DELICRAFT</h1>
        <p class="text-zinc-400">Türkiye'nin en eğlenceli dünyasına hoş geldin.</p>

        <div class="space-y-4">
            <div id="hakkimizda" class="bg-white/5 border gold-border rounded-xl">
                <button onclick="document.getElementById('h-box').classList.toggle('hidden')" class="w-full p-6 text-left gold-text font-bold">Hakkımızda ▼</button>
                <div id="h-box" class="hidden p-6 pt-0 text-zinc-400">DeliCraft, 2026 yılında kurulan bir arkadaş topluluğudur.</div>
            </div>

            <div id="kurucular" class="bg-white/5 border gold-border rounded-xl">
                <button onclick="document.getElementById('k-box').classList.toggle('hidden')" class="w-full p-6 text-left gold-text font-bold">Kurucular ▼</button>
                <div id="k-box" class="hidden p-6 pt-0 text-zinc-400">EFES, JAHOCK, MALANDİNA</div>
            </div>
            
            <div id="sosyal" class="bg-white/5 border gold-border rounded-xl">
                <button onclick="document.getElementById('s-box').classList.toggle('hidden')" class="w-full p-6 text-left gold-text font-bold">Sosyal Medya ▼</button>
                <div id="s-box" class="hidden p-6 pt-0 flex flex-col gap-2">
                    <a href="#" class="text-zinc-400 hover:text-[#D4AF37]">Instagram</a>
                    <a href="#" class="text-zinc-400 hover:text-[#D4AF37]">TikTok</a>
                    <a href="#" class="text-zinc-400 hover:text-[#D4AF37]">YouTube</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
