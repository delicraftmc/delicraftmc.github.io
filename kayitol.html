<input type="text" id="username" placeholder="Minecraft Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none" required>

<script type="module">
    // ... (Firebase ve EmailJS kısımları aynı kalacak)

    document.getElementById('kayitForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value; // Kullanıcı adını aldık
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const kod = Math.floor(100000 + Math.random() * 900000);

        try {
            await emailjs.send("DeliCraft", "template_hha4g7k", {
                to_email: email,
                verification_code: kod 
            });

            const girilenKod = prompt("E-postana gelen 6 haneli kodu gir:");

            if (girilenKod == kod.toString()) {
                // Firebase'e kayıt
                await createUserWithEmailAndPassword(auth, email, password);
                
                // Pampa, buraya MongoDB'ye yazdıracak kodu ekleyeceğiz. 
                // Şimdi MongoDB'ye kayıt atacak olan "fetch" fonksiyonunu hazırla:
                console.log("Kayıt olundu:", username, email, password);
                
                alert("Kayıt başarılı, hoş geldin " + username + "!");
                window.location.href = "index.html";
            } else {
                alert("Kod yanlış!");
            }
        } catch (error) {
            alert("Hata: " + error.message);
        }
    });
</script>
