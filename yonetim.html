<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliCraft | Oyuncu Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #09090b; color: white; }
        .glow-blob { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%); filter: blur(60px); z-index: -1; top: -100px; left: -100px; }
        .glow-blob-2 { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%); filter: blur(60px); z-index: -1; bottom: -100px; right: -100px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div class="glow-blob"></div>
    <div class="glow-blob-2"></div>
    
    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 border border-white/10 p-6 rounded-2xl w-full max-w-sm text-center">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">DeliCraft</h3>
            <p id="modalText" class="mb-6 text-zinc-400"></p>
            <button id="modalBtn" class="w-full bg-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Tamam</button>
        </div>
    </div>

    <main class="w-full max-w-5xl">
        <h1 class="text-3xl font-extrabold mb-8">Karakter Yönetimi</h1>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-white/5 border border-white/10 rounded-3xl p-6 flex flex-col items-center">
                <img id="skinPreviewImage" src="https://crafatar.com/renders/body/069a79f444e94726a5befca90e38aaf5?overlay=true" class="h-72 object-contain">
            </div>
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white/5 border border-white/10 rounded-3xl p-6">
                    <h3 class="text-xl font-bold mb-2">Skin Değiştir</h3>
                    <input type="file" id="skinInput" accept=".png">
                    <label for="skinInput" class="bg-indigo-600 px-6 py-3 rounded-xl cursor-pointer">Dosya Seç (Skin)</label>
                    <span id="skinFileName" class="ml-4 text-sm text-zinc-500">Henüz dosya seçilmedi...</span>
                </div>
                
                <div class="flex gap-4 justify-end mt-4">
                    <button id="skipButton" class="bg-zinc-800 px-6 py-3 rounded-xl font-bold">Şimdilik Geç</button>
                    <button id="saveButton" class="bg-emerald-600 px-8 py-3 rounded-xl font-bold">Yükle ve Başla</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const modal = document.getElementById('modal');
        function showModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            modal.classList.remove('hidden');
            return new Promise(resolve => {
                document.getElementById('modalBtn').onclick = () => {
                    modal.classList.add('hidden');
                    resolve();
                };
            });
        }

        document.getElementById('saveButton').addEventListener('click', async () => {
            await showModal("Başarılı", "Skin başarıyla yüklendi. Artık oyuna girebilirsin.");
            window.location.href = 'index.html';
        });

        document.getElementById('skipButton').addEventListener('click', async () => {
            await showModal("Bilgi", "Varsayılan skin atandı! Daha sonra profilinden değiştirebilirsin.");
            window.location.href = 'index.html';
        });
        
        // Dosya ismi gösterme mantığı aynı...
        document.getElementById('skinInput').addEventListener('change', (e) => {
            document.getElementById('skinFileName').textContent = e.target.files[0]?.name || "Henüz dosya seçilmedi...";
        });
    </script>
</body>
</html>
